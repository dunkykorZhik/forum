{{ define "alert" }}

{{ if .Error }}
  <div class="alert error">⚠ {{ .Error }}</div>
{{ end }}

{{ if .Warn }}
  <div class="alert warn">⚡ {{ .Warn }}</div>
{{ end }}

{{ if .Info }}
  <div class="alert info">ℹ {{ .Info }}</div>
{{ end }}

{{ if .Success }}
  <div class="alert success">✔ {{ .Success }}</div>
{{ end }}

{{ end }}
