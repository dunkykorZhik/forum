{{ define "block" }}
{{ $Page := .}}

<section class="form-page">

  <h1>⚡ Categories</h1>

  <form action="/categories/posts" method="GET" class="form">

    <div id="b_TagEditor" class="tag-editor"></div>
    <textarea name="categories" id="tb_TagEditor" hidden></textarea>

    <button class="btn neon">Search</button>

  </form>

</section>

<section class="feed">

  {{ range $Category := $Page.Categories }}

  <div class="card center">

    <a href="/categories/posts?categories={{ $Category.Name }}" class="tag big">
      #{{ $Category.Name }}
    </a>

    <span class="meta">
      {{ $Category.CreatedAt.Format "2006-01-02 15:04" }}
    </span>

  </div>

  {{ end }}

</section>

<script src="/static/js/tag-editor.js"></script>
<script>
new TagEditor({
  BlockSelectorName: "#b_TagEditor",
  TextBlockSelectorName: "#tb_TagEditor",
  Tags: [],
  MaxTags: 5,
  MaxTagLength: 32,
});
</script>

{{ end }}
