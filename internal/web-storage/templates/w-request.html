{{ define "block" }}

<section class="feed">

{{ range .Posts }}

  <div class="card">

    <span>
      {{ if .Valid }}
        ✔ Accepted: {{ .Title }}
      {{ else if .IsValid }}
        ⏳ Pending: {{ .Title }}
      {{ else }}
        ❌ Rejected: {{ .Title }}
      {{ end }}
    </span>

    <span class="meta">{{ .Date }}</span>

  </div>

{{ end }}

</section>

{{ end }}
