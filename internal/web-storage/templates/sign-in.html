{{define "block"}}
<section class="auth-page">

  <div class="auth-card">
    <h1>⚡ Login</h1>
    {{template "signinForm"}}
  </div>

</section>
{{end}}

{{ define "signinForm" }}
<form action="/signin" method="POST" class="form">

  <input type="text" name="login" class="input" placeholder="Email or Username" required>

  <input type="password" name="password" class="input" placeholder="Password" required>

  <button class="btn neon full">Sign In</button>

</form>
{{ end }}
