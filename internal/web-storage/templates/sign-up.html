{{define "block"}}
<section class="auth-page">

  <div class="auth-card">
    <h1>⚡ Register</h1>
    {{template "signupForm"}}
  </div>

</section>
{{end}}

{{ define "signupForm" }}

<form action="/signup" method="POST" class="form">

  <input type="text" name="username" class="input" placeholder="Username" required>

  <input type="email" name="email" class="input" placeholder="Email" required>

  <input type="password" name="password" id="password-original" class="input" placeholder="Password" required onkeyup="confirmPasswordOnKeyUp()">

  <input type="password" id="password-confirm" class="input" placeholder="Confirm Password" required onkeyup="confirmPasswordOnKeyUp()">

  <button class="btn neon full" id="btn-signup-submit">Sign Up</button>

</form>

<script src="/static/js/pass.js"></script>
{{ end }}
