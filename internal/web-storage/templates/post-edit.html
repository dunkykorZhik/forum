{{ define "block" }}
{{ $Post := .Post }}

<section class="form-page">

  <h1>⚡ Edit Post</h1>

  <form action="/post/edit" method="POST" class="form">

    <input type="number" name="id" value="{{ $Post.Id }}" hidden>

    <input 
      type="text" 
      name="title" 
      value="{{ $Post.Title }}" 
      required 
      class="input"
      placeholder="Title..."
    >

    <textarea 
      name="content" 
      required 
      class="textarea"
      placeholder="Edit your content..."
    >{{ $Post.Content }}</textarea>

    <div>
      <label>Categories</label>
      <div id="b_TagEditor" class="tag-editor"></div>
      <textarea name="categories" id="tb_TagEditor" hidden></textarea>
    </div>

    <button class="btn neon" type="submit">Update Post</button>

  </form>

</section>

<script src="/static/js/tag-editor.js"></script>
<script>
const tags = [
  {{- range $i, $category := $Post.Categories }}
    {{- if $i }}, {{ end }}
    {{ printf "%q" $category.Name }}
  {{- end }}
];

new TagEditor({
  BlockSelectorName: "#b_TagEditor",
  TextBlockSelectorName: "#tb_TagEditor",
  Tags: tags,
  MaxTags: 5,
  MaxTagLength: 32,
});
</script>

{{ end }}
